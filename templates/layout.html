<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pizzería</title>

    <!-- Fuente estilo logo -->
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
        }

        /* NAVBAR */

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #c0392b;
            padding: 15px 40px;
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* logo */

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 100px;
            margin-right: 10px;
        }

        .logo h2 {
            margin: 0;
            font-family: 'Luckiest Guy', cursive;
            font-size: 42px;
            letter-spacing: 2px;
            color: #ff3b3b;
            -webkit-text-stroke: 2px #2e7d32;
            text-shadow: 3px 3px 0px #f1c40f;
        }

        /* menu */

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background: white;
            color: #c0392b;
        }

        /* contenido */

        .container {
            width: 85%;
            margin: auto;
            margin-top: 40px;
        }

        /* tarjetas */

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* tabla */

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #c0392b;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>

</head>

<body>

    <div class="navbar">

        <div class="logo">

            <img src="{{ url_for('static', filename='img/logo.png') }}">

            <h2>Pizzería</h2>

        </div>

        <div class="nav-links">

            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('clientes.lista_clientes') }}">Detalle venta</a>
            <a href="{{ url_for('ventas.ventas') }}">Ventas</a>
            <a href="{{ url_for('pedidos.nuevo_pedido') }}">Nuevo Pedido</a>

        </div>

    </div>

    </div>

    <div class="container">

        <div class="card">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>

</html>
